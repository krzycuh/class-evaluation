# Produkcja (np. Raspberry Pi) — obrazy z GHCR budowane przez GitHub Actions.
#
#   cp .env.example .env       # ustaw DB_PASSWORD itd.
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Wersja obrazów: VERSION w .env (domyślnie `main` = ostatni build z main;
# po publikacji release'a można przypiąć np. VERSION=1.0.0).
# Przy prywatnym repo najpierw: docker login ghcr.io -u <user> -p <PAT z read:packages>

services:
  db:
    image: postgres:16-alpine
    container_name: class-evaluation-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: class_evaluation
      POSTGRES_USER: class_evaluation
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Ustaw DB_PASSWORD w pliku .env}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U class_evaluation"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/krzycuh/class-evaluation/backend:${VERSION:-main}
    container_name: class-evaluation-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/class_evaluation
      DB_USER: class_evaluation
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@example.com}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      APP_ADMIN_NAME: ${APP_ADMIN_NAME:-Administrator}
      APP_CLASS_GROUP_NAME: ${APP_CLASS_GROUP_NAME:-Moja grupa}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # skromny przydział pamięci pod Raspberry Pi
      JAVA_OPTS: "-Xms128m -Xmx512m -XX:+UseSerialGC"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/krzycuh/class-evaluation/frontend:${VERSION:-main}
    container_name: class-evaluation-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8000}:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
